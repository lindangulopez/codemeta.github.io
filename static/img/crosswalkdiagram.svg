<svg width="1200" height="550" viewBox="0 0 1200 550" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #e6e6e6; }
    .panel { fill: none; stroke: #777; stroke-width: 2; rx: 12; }
    .title { font: bold 24px sans-serif; fill: #000; }
    .box { rx: 8; }
    .text { font: 14px sans-serif; fill: #fff; dominant-baseline: middle; text-anchor: middle; }
  </style>

  <!-- Full Background -->
  <rect x="0" y="0" width="1200" height="550" class="bg"/>

  <!-- Left Panel -->
  <rect x="40" y="40" width="320" height="460" class="panel"/>
  <text x="200" y="80" class="title" text-anchor="middle">DataCite Terms →</text>

  <rect x="70" y="110" width="260" height="50" fill="#8c3b00" class="box"/>
  <text x="200" y="135" class="text">creators (exact_match)</text>

  <rect x="70" y="180" width="260" height="50" fill="#5f5f5f" class="box"/>
  <text x="200" y="205" class="text">Rights (close_match)</text>

  <rect x="70" y="250" width="260" height="50" fill="#f08c28" class="box"/>
  <text x="200" y="275" class="text">version (exact_match)</text>


  <!-- Center Panel -->
  <rect x="440" y="40" width="320" height="460" class="panel"/>
  <text x="600" y="80" class="title" text-anchor="middle">CodeMeta Terms</text>

  <rect x="470" y="110" width="260" height="50" fill="#8c3b00" class="box"/>
  <text x="600" y="135" class="text">author</text>

  <rect x="470" y="170" width="260" height="50" fill="#cc4c02" class="box"/>
  <text x="600" y="195" class="text">author/name</text>

  <rect x="470" y="230" width="260" height="50" fill="#cc4c02" class="box"/>
  <text x="600" y="255" class="text">author/identifier</text>

  <rect x="470" y="290" width="260" height="50" fill="#cc4c02" class="box"/>
  <text x="600" y="315" class="text">author/affiliation/name</text>

  <rect x="470" y="350" width="260" height="50" fill="#5f5f5f" class="box"/>
  <text x="600" y="375" class="text">licence</text>

  <rect x="470" y="410" width="260" height="50" fill="#f08c28" class="box"/>
  <text x="600" y="435" class="text">softwareVersion</text>


  <!-- Right Panel -->
  <rect x="840" y="40" width="320" height="460" class="panel"/>
  <text x="1000" y="80" class="title" text-anchor="middle">← Zenodo Terms</text>

  <rect x="870" y="110" width="260" height="50" fill="#cc4c02" class="box"/>
  <text x="1000" y="135" class="text">metadata/creators/name (exact_match)</text>

  <rect x="870" y="180" width="260" height="50" fill="#cc4c02" class="box"/>
  <text x="1000" y="205" class="text">metadata/.../orcid (more_specific_than)</text>

  <rect x="870" y="250" width="260" height="50" fill="#cc4c02" class="box"/>
  <text x="1000" y="275" class="text">metadata/.../affiliation (exact_match)</text>

  <rect x="870" y="320" width="260" height="50" fill="#5f5f5f" class="box"/>
  <text x="1000" y="345" class="text">metadata/license/id (exact_match)</text>

  <rect x="870" y="390" width="260" height="50" fill="#f08c28" class="box"/>
  <text x="1000" y="415" class="text">metadata/version (exact_match)</text>
</svg>